apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: labels-postgres-data
  namespace: skirmshop
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 10Gi } }
  storageClassName: longhorn
---
# Labels Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: labels-redis
  namespace: skirmshop
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: labels-redis } }
  template:
    metadata: { labels: { app: labels-redis } }
    spec:
      enableServiceLinks: false
      nodeSelector:
        role: edge
        kubernetes.io/arch: amd64
      tolerations:
        - { key: role, operator: Equal, value: edge, effect: NoSchedule }
      containers:
        - name: redis
          image: redis:8.0.0
          command: [redis-server, --appendonly, "yes"]
          ports:
            - { name: redis, containerPort: 6379 }
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits:   { memory: 256Mi }
          readinessProbe:
            exec: { command: [redis-cli, ping] }
---
---
apiVersion: v1
kind: Service
metadata:
  name: labels-redis
  namespace: skirmshop
spec:
  selector: { app: labels-redis }
  ports:
    - { name: redis, port: 6379, targetPort: 6379 }
---
---
# Labels NATS
apiVersion: apps/v1
kind: Deployment
metadata:
  name: labels-nats
  namespace: skirmshop
spec:
  replicas: 1
  selector: { matchLabels: { app: labels-nats } }
  template:
    metadata: { labels: { app: labels-nats } }
    spec:
      enableServiceLinks: false
      nodeSelector:
        role: edge
        kubernetes.io/arch: amd64
      tolerations:
        - { key: role, operator: Equal, value: edge, effect: NoSchedule }
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["-js", "-sd", "/data", "-m", "8222"]
          ports:
            - { name: client, containerPort: 4222 }
            - { name: monitor, containerPort: 8222 }
            - { name: cluster, containerPort: 6222 }
          volumeMounts:
            - { name: data, mountPath: /data }
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits:   { memory: 256Mi }
          readinessProbe:
            httpGet: { path: /healthz, port: 8222 }
            initialDelaySeconds: 3
      volumes:
        - name: data
          emptyDir: {}   # JetStream persistence; use PVC for production
---
---
apiVersion: v1
kind: Service
metadata:
  name: labels-nats
  namespace: skirmshop
spec:
  selector: { app: labels-nats }
  ports:
    - { name: client, port: 4222, targetPort: 4222 }
    - { name: monitor, port: 8222, targetPort: 8222 }

# ExternalSecret — labels app secrets
---
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: labels-secrets
  namespace: skirmshop
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vault-backend, kind: ClusterSecretStore }
  target:
    name: labels-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract: { key: secret/skirmshop/labels }

