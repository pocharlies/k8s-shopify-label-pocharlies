# ── Synapse workflow engine ───────────────────────────────────────────────────
---
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: synapse-tokens
  namespace: skirmshop
data:
  tokens.yaml: |
    h0v0fixhkg9z4bgtxele7892x9sjtw7o:
      sub: 00000000-0000-0000-0000-000000000003
      name: skirmshop-compose-service
      role: admin
---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: labels-synapse-api
  namespace: skirmshop
spec:
  replicas: 1
  selector: { matchLabels: { app: labels-synapse-api } }
  template:
    metadata: { labels: { app: labels-synapse-api } }
    spec:
      enableServiceLinks: false
      nodeSelector: { role: edge, kubernetes.io/arch: amd64 }
      tolerations:
        - { key: role, operator: Equal, value: edge, effect: NoSchedule }
      containers:
        - name: synapse-api
          image: ghcr.io/serverlessworkflow/synapse/api:1.0.0-alpha1
          ports: [{ name: http, containerPort: 8080 }]
          env:
            - { name: SYNAPSE_API_AUTH_TOKEN_FILE, value: /app/tokens.yaml }
            - { name: SYNAPSE_API_JWT_AUTHORITY, value: "http://labels-synapse-api.skirmshop.svc.cluster.local:8080" }
            - { name: CONNECTIONSTRINGS__REDIS, value: "labels-redis.skirmshop.svc.cluster.local:6379" }
            - { name: SYNAPSE_DASHBOARD_SERVE, value: "true" }
          envFrom: [{ secretRef: { name: labels-secrets } }]
          volumeMounts:
            - { name: tokens, mountPath: /app/tokens.yaml, subPath: tokens.yaml }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { memory: 512Mi }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 15
      volumes:
        - name: tokens
          configMap: { name: synapse-tokens }
---
---
apiVersion: v1
kind: Service
metadata: { name: labels-synapse-api, namespace: skirmshop }
spec:
  selector: { app: labels-synapse-api }
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: labels-synapse-correlator
  namespace: skirmshop
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: labels-synapse-correlator } }
  template:
    metadata: { labels: { app: labels-synapse-correlator } }
    spec:
      enableServiceLinks: false
      nodeSelector: { role: edge, kubernetes.io/arch: amd64 }
      tolerations:
        - { key: role, operator: Equal, value: edge, effect: NoSchedule }
      initContainers:
        - name: synapse-namespace-init
          image: curlimages/curl:8.13.0
          command:
            - sh
            - -c
            - |
              API=http://labels-synapse-api.skirmshop.svc.cluster.local:8080
              TOKEN=$(awk 'NR==1{gsub(/:/,""); print}' /tokens/tokens.yaml)
              NS=skirmshop
              until curl -sf "$API/healthz" > /dev/null 2>&1; do
                echo "Waiting for Synapse API..."; sleep 3
              done
              CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
                -H "Authorization: Bearer $TOKEN" "$API/api/v1/namespaces/$NS")
              if [ "$CODE" = "200" ]; then
                echo "Synapse namespace $NS already exists"
              else
                curl -sf -X POST -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "{\"apiVersion\":\"neuroglia.io/v1\",\"kind\":\"Namespace\",\"metadata\":{\"name\":\"$NS\"}}" \
                  "$API/api/v1/namespaces" && echo "Synapse namespace $NS created"
              fi
          volumeMounts:
            - { name: tokens, mountPath: /tokens }
      containers:
        - name: synapse-correlator
          image: ghcr.io/serverlessworkflow/synapse/correlator:1.0.0-alpha1
          ports: [{ name: http, containerPort: 8080 }]
          env:
            - { name: SYNAPSE_CORRELATOR_NAMESPACE, value: skirmshop }
            - { name: SYNAPSE_CORRELATOR_NAME, value: skirmshop-correlator }
            - { name: CONNECTIONSTRINGS__REDIS, value: "labels-redis.skirmshop.svc.cluster.local:6379" }
          envFrom: [{ secretRef: { name: labels-secrets } }]
          resources:
            requests: { cpu: 30m, memory: 64Mi }
            limits:   { memory: 256Mi }
      volumes:
        - name: tokens
          configMap: { name: synapse-tokens }
---
---
apiVersion: v1
kind: Service
metadata: { name: labels-synapse-correlator, namespace: skirmshop }
spec:
  selector: { app: labels-synapse-correlator }
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: labels-synapse-operator
  namespace: skirmshop
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: labels-synapse-operator } }
  template:
    metadata: { labels: { app: labels-synapse-operator } }
    spec:
      enableServiceLinks: false
      serviceAccountName: labels-synapse-operator
      nodeSelector: { role: edge, kubernetes.io/arch: amd64 }
      tolerations:
        - { key: role, operator: Equal, value: edge, effect: NoSchedule }
      initContainers:
        - name: synapse-namespace-init
          image: curlimages/curl:8.13.0
          command:
            - sh
            - -c
            - |
              API=http://labels-synapse-api.skirmshop.svc.cluster.local:8080
              TOKEN=$(awk 'NR==1{gsub(/:/,""); print}' /tokens/tokens.yaml)
              NS=skirmshop
              until curl -sf "$API/healthz" > /dev/null 2>&1; do
                echo "Waiting for Synapse API..."; sleep 3
              done
              CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
                -H "Authorization: Bearer $TOKEN" "$API/api/v1/namespaces/$NS")
              if [ "$CODE" = "200" ]; then
                echo "Synapse namespace $NS already exists"
              else
                curl -sf -X POST -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "{\"apiVersion\":\"neuroglia.io/v1\",\"kind\":\"Namespace\",\"metadata\":{\"name\":\"$NS\"}}" \
                  "$API/api/v1/namespaces" && echo "Synapse namespace $NS created"
              fi
          volumeMounts:
            - { name: tokens, mountPath: /tokens }
      containers:
        - name: synapse-operator
          image: ghcr.io/serverlessworkflow/synapse/operator:1.0.0-alpha1
          env:
            - { name: CONNECTIONSTRINGS__REDIS, value: "labels-redis.skirmshop.svc.cluster.local:6379" }
            - { name: SYNAPSE_OPERATOR_NAME, value: skirmshop-operator }
            - { name: SYNAPSE_OPERATOR_NAMESPACE, value: skirmshop }
            - { name: SYNAPSE_RUNNER_API, value: "http://labels-synapse-api.skirmshop.svc.cluster.local:8080" }
            - { name: SYNAPSE_RUNNER_CONTAINER_PLATFORM, value: kubernetes }
            - { name: SYNAPSE_RUNNER_LIFECYCLE_EVENTS, value: "true" }
          envFrom: [{ secretRef: { name: labels-secrets } }]
          resources:
