apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: labels-postgres-data
  namespace: skirmshop
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 10Gi } }
  storageClassName: longhorn
---
# Labels Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: labels-redis
  namespace: skirmshop
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: labels-redis } }
  template:
    metadata: { labels: { app: labels-redis } }
    spec:
      enableServiceLinks: false
      nodeSelector:
        role: edge
        kubernetes.io/arch: amd64
      tolerations:
        - { key: role, operator: Equal, value: edge, effect: NoSchedule }
      containers:
        - name: redis
          image: redis:8.0.0
          command: [redis-server, --appendonly, "yes"]
          ports:
            - { name: redis, containerPort: 6379 }
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits:   { memory: 256Mi }
          readinessProbe:
            exec: { command: [redis-cli, ping] }
---
---
apiVersion: v1
kind: Service
metadata:
  name: labels-redis
  namespace: skirmshop
spec:
  selector: { app: labels-redis }
  ports:
    - { name: redis, port: 6379, targetPort: 6379 }
---
---
# Labels NATS
apiVersion: apps/v1
kind: Deployment
metadata:
  name: labels-nats
  namespace: skirmshop
spec:
  replicas: 1
  selector: { matchLabels: { app: labels-nats } }
  template:
    metadata: { labels: { app: labels-nats } }
    spec:
      enableServiceLinks: false
      nodeSelector:
        role: edge
        kubernetes.io/arch: amd64
      tolerations:
        - { key: role, operator: Equal, value: edge, effect: NoSchedule }
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["-js", "-sd", "/data", "-m", "8222"]
          ports:
            - { name: client, containerPort: 4222 }
            - { name: monitor, containerPort: 8222 }
            - { name: cluster, containerPort: 6222 }
          volumeMounts:
            - { name: data, mountPath: /data }
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits:   { memory: 256Mi }
          readinessProbe:
            httpGet: { path: /healthz, port: 8222 }
            initialDelaySeconds: 3
      volumes:
        - name: data
          emptyDir: {}   # JetStream persistence; use PVC for production
---
---
apiVersion: v1
kind: Service
metadata:
  name: labels-nats
  namespace: skirmshop
spec:
  selector: { app: labels-nats }
  ports:
    - { name: client, port: 4222, targetPort: 4222 }
    - { name: monitor, port: 8222, targetPort: 8222 }

# ExternalSecret — labels app secrets
---
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: labels-secrets
  namespace: skirmshop
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vault-backend, kind: ClusterSecretStore }
  target:
    name: labels-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract: { key: secret/skirmshop/labels }

# ── labels microservices (stateless) ─────────────────────────────────────────
# All use harbor.e-dani.com/homelab/skirmshop-labels-<name>:latest
# Build from local images before deploying (Phase 8 CI step).
---
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: labels-shopify-app-config
  namespace: skirmshop
data:
  EASY_PRINT_PACKING_SLIP_URL_TEMPLATE: "https://admin.shopify.com/store/skirmshop-spain/apps/shopify-order-printer/app/orders/bulk?id={orderNumericId}"
---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: labels-shopify-app
  namespace: skirmshop
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector: { matchLabels: { app: labels-shopify-app } }
  template:
    metadata: { labels: { app: labels-shopify-app } }
    spec:
      enableServiceLinks: false
      nodeSelector: { role: edge, kubernetes.io/arch: amd64 }
      tolerations:
        - { key: role, operator: Equal, value: edge, effect: NoSchedule }
      # Bound to the labels-shopify-app SA (defined below) so the admin
      # "Tarifas" page can patch labels-cex-surcharges. Without this the
      # pod runs with the default SA which has no configmap permissions
      # and the PATCH endpoint returns 500 K8S_PATCH_FAILED.
      serviceAccountName: labels-shopify-app
      containers:
        - name: shopify-app
          lifecycle:
            preStop:
              exec: { command: ["/bin/sh", "-c", "sleep 10"] }
          image: harbor.e-dani.com/homelab/skirmshop-labels-shopify-app@sha256:d30f299d7e92ff6b1d46c2946bad303800943fa37cd46ce0a7906ccc94315b53  # pin por digest (no :latest, policy Kyverno disallow-latest-tag)
          ports: [{ name: http, containerPort: 3000 }]
          env:
            - { name: PORT, value: "3000" }
            # Shopify signs embedded app sessions with the internal shop handle.
            # This direct env overrides the legacy value still present in labels-secrets.
            - { name: SHOPIFY_SHOP_DOMAIN, value: "ymimst-yh.myshopify.com" }
            - { name: DATABASE_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres-shared-rw.databases.svc.cluster.local:5432/labels" }
            - { name: PG_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres-shared-rw.databases.svc.cluster.local:5432/labels" }
            - { name: POSTGRES_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres-shared-rw.databases.svc.cluster.local:5432/labels" }
            - { name: REDIS_URL, value: "redis://labels-redis.skirmshop.svc.cluster.local:6379" }
            - { name: RABBITMQ_URL, value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@shared-rabbitmq.databases.svc.cluster.local:5672" }
            - { name: ROUTING_SERVICE_URL, value: "http://labels-routing-service.skirmshop.svc.cluster.local:3001" }
            - { name: SYNAPSE_API_URL, value: "http://labels-synapse-api.skirmshop.svc.cluster.local:8080" }
            - { name: CEX_ADAPTER_URL, value: "http://labels-correos-express-adapter.skirmshop.svc.cluster.local:3003" }
            - { name: UPS_ADAPTER_URL, value: "http://labels-ups-adapter.skirmshop.svc.cluster.local:3002" }
            - { name: CORREOS_ADAPTER_URL, value: "http://labels-correos-adapter.skirmshop.svc.cluster.local:3011" }
            - { name: LABEL_STORAGE_URL, value: "http://labels-label-storage.skirmshop.svc.cluster.local:3007" }
            - { name: CORREOS_ENABLED, value: "false" }
            # Per-destination VAT applied to checkout rates so the customer
            # pays the all-in price under taxesIncluded:true + taxShipping:
            # true. ConfigMap is refreshed weekly by labels-vat-sync from
            # Shopify Admin REST /countries.json.
            - { name: VAT_RATES_FILE, value: "/etc/vat/vat-rates.json" }
            - name: EASY_PRINT_PACKING_SLIP_URL_TEMPLATE
              valueFrom:
                configMapKeyRef:
                  name: labels-shopify-app-config
                  key: EASY_PRINT_PACKING_SLIP_URL_TEMPLATE
          envFrom: [{ secretRef: { name: labels-secrets } }]
          volumeMounts:
            # WHOLE directory mount — subPath blocks kubelet auto-refresh.
            # The ConfigMap projects vat-rates.json into /etc/vat/ and the
            # per-request loader in rates.ts re-reads it from there.
            - { name: vat-rates, mountPath: /etc/vat, readOnly: true }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { memory: 512Mi }
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 15
      volumes:
        - name: vat-rates
          configMap: { name: labels-vat-rates }
---
---
apiVersion: v1
kind: Service
metadata: { name: labels-shopify-app, namespace: skirmshop }
spec:
  selector: { app: labels-shopify-app }
  ports: [{ name: http, port: 3004, targetPort: 3000 }]
---
# RBAC for the Tarifas admin page. The shopify-app pod uses its in-pod
# ServiceAccount token to PATCH labels-cex-surcharges (fuel rate, DUA,
# Portugal supplement) and GET annotations from labels-cex-rate-table
# (loaded-at, contract-period, source) — both scoped to this namespace,
# both resource-named, no wildcard.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: labels-shopify-app
  namespace: skirmshop
# Inherit the Harbor pull secret from the default SA — without it kubelet
# fails to pull the shopify-app image with "no basic auth credentials".
imagePullSecrets:
  - name: harbor-pull
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: labels-shopify-app-cex-config
  namespace: skirmshop
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames:
      - labels-cex-rate-table
      - labels-cex-surcharges
      - labels-vat-rates
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: labels-shopify-app-cex-config
  namespace: skirmshop
subjects:
  - kind: ServiceAccount
    name: labels-shopify-app
    namespace: skirmshop
roleRef:
  kind: Role
  name: labels-shopify-app-cex-config
  apiGroup: rbac.authorization.k8s.io
---
---
