          image: harbor.e-dani.com/homelab/skirmshop-labels-event-gateway@sha256:50884d0db3ba97edbf68e9a9df0f7c8f0bb084396234846c226b33c269e76e59  # pin por digest (no :latest, policy Kyverno disallow-latest-tag)
          ports: [{ name: http, containerPort: 3000 }]
          env:
            - { name: PORT, value: "3000" }
            - { name: RABBITMQ_URL, value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@shared-rabbitmq.databases.svc.cluster.local:5672" }
            - { name: NATS_URL, value: "nats://labels-nats.skirmshop.svc.cluster.local:4222" }
          envFrom: [{ secretRef: { name: labels-secrets } }]
          resources:
            requests: { cpu: 30m, memory: 64Mi }
            limits:   { memory: 256Mi }
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 10
---
