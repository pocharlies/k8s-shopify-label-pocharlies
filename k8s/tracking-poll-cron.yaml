apiVersion: v1
kind: ConfigMap
metadata:
  name: labels-tracking-poll-scheduler
  namespace: skirmshop
data:
  poll-tracking-scheduler.mjs: |
    import { randomUUID } from 'node:crypto';
    import { setTimeout as sleep } from 'node:timers/promises';
    import pg from 'pg';

    const { Pool } = pg;

    const config = {
      pgUrl: required('PG_URL'),
      synapseApiUrl: required('SYNAPSE_API_URL').replace(/\/+$/, ''),
      synapseApiToken: required('SYNAPSE_API_TOKEN'),
      workflowNamespace: process.env.POLL_TRACKING_WORKFLOW_NAMESPACE ?? 'skirmshop',
      workflowName: process.env.POLL_TRACKING_WORKFLOW_NAME ?? 'poll-tracking',
      workflowVersion: process.env.POLL_TRACKING_WORKFLOW_VERSION ?? '1.2.0',
      batchSize: positiveInt(process.env.POLL_TRACKING_BATCH_SIZE, 100),
      requestTimeoutMs: positiveInt(process.env.REQUEST_TIMEOUT_MS, 15000),
      launchDelayMs: positiveInt(process.env.POLL_TRACKING_LAUNCH_DELAY_MS, 50),
    };

    const pool = new Pool({ connectionString: config.pgUrl });

    try {
      const shipments = await loadUnscannedShipments();
      log('tracking-poll-scheduler.candidates', { count: shipments.length });

      let launched = 0;
      let duplicates = 0;
      let failed = 0;

      for (const shipment of shipments) {
        try {
          const result = await launchPollTracking(shipment);
          if (result === 'duplicate') duplicates += 1;
          else launched += 1;
        } catch (err) {
          failed += 1;
          log('tracking-poll-scheduler.launch_failed', {
            orderId: shipment.order_id,
            shipmentId: shipment.shipment_id,
            trackingNumber: shipment.tracking_number,
            carrier: shipment.carrier,
            error: err instanceof Error ? err.message : String(err),
          });
        }
        if (config.launchDelayMs > 0) await sleep(config.launchDelayMs);
      }

      log('tracking-poll-scheduler.done', {
        candidates: shipments.length,
        launched,
        duplicates,
        failed,
      });
      if (failed > 0) process.exitCode = 1;
    } finally {
      await pool.end();
    }

    async function loadUnscannedShipments() {
      const result = await pool.query(
        `
          WITH latest_accepted AS (
            SELECT DISTINCT ON (payload->>'shipmentId')
                   id,
                   aggregate_id AS order_id,
                   payload->>'shipmentId' AS shipment_id,
                   payload->>'carrier' AS carrier,
                   COALESCE(payload->>'trackingNumber', payload->>'carrierShipmentId') AS tracking_number,
                   occurred_at AS accepted_at,
                   global_seq
              FROM event_store
             WHERE event_type = 'CarrierAccepted'
               AND payload->>'shipmentId' IS NOT NULL
               AND payload->>'carrier' IN ('ups', 'correos_express', 'correos')
             ORDER BY payload->>'shipmentId', occurred_at DESC, global_seq DESC
          )
          SELECT ca.order_id,
                 ca.shipment_id,
                 ca.carrier,
                 ca.tracking_number,
                 ca.accepted_at
            FROM latest_accepted ca
           WHERE ca.tracking_number IS NOT NULL
             AND btrim(ca.tracking_number) <> ''
             AND NOT EXISTS (
                   SELECT 1
                     FROM tracking_event te
                    WHERE te.shipment_id = ca.shipment_id
                 )
             AND NOT EXISTS (
                   SELECT 1
                     FROM event_store sf
                    WHERE sf.aggregate_id = ca.order_id
                      AND sf.event_type = 'ShipmentFailed'
                      AND sf.occurred_at >= ca.accepted_at
                      AND sf.payload->>'shipmentId' = ca.shipment_id
                      AND lower(COALESCE(sf.payload->>'reason', '')) LIKE '%admin-cancel%'
                 )
           ORDER BY ca.accepted_at ASC
           LIMIT $1
        `,
        [config.batchSize],
      );
      return result.rows;
    }

    async function launchPollTracking(shipment) {
      const correlationId = randomUUID();
      const instanceName = `poll-${correlationId}`;
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), config.requestTimeoutMs);

      try {
        const response = await fetch(`${config.synapseApiUrl}/api/v1/workflow-instances`, {
          method: 'POST',
          signal: controller.signal,
          headers: {
            accept: 'application/json',
            'content-type': 'application/json',
            authorization: `Bearer ${config.synapseApiToken}`,
          },
          body: JSON.stringify({
            metadata: {
              namespace: config.workflowNamespace,
              name: instanceName,
              labels: {
                'app.kubernetes.io/managed-by': 'skirmshop-labels',
                'skirmshop.es/scheduler': 'tracking-poll',
                'skirmshop.es/order-id': labelValue(String(shipment.order_id)),
                'skirmshop.es/shipment-id': labelValue(String(shipment.shipment_id)),
              },
            },
            spec: {
              definition: {
                namespace: config.workflowNamespace,
                name: config.workflowName,
                version: config.workflowVersion,
              },
              input: {
                shipmentId: shipment.shipment_id,
                orderId: shipment.order_id,
                carrier: shipment.carrier,
                trackingNumber: shipment.tracking_number,
                correlationId,
              },
            },
          }),
        });
        const body = await response.json().catch(() => ({}));
        if (response.status === 409) {
          log('tracking-poll-scheduler.duplicate', {
            instanceName,
            orderId: shipment.order_id,
            shipmentId: shipment.shipment_id,
          });
          return 'duplicate';
        }
        if (!response.ok) {
          throw new Error(`Synapse HTTP ${response.status}: ${JSON.stringify(body)}`);
        }
        log('tracking-poll-scheduler.launched', {
          instanceName,
          orderId: shipment.order_id,
          shipmentId: shipment.shipment_id,
          carrier: shipment.carrier,
          trackingNumber: shipment.tracking_number,
        });
        return 'launched';
      } finally {
        clearTimeout(timeout);
      }
    }

    function required(name) {
      const value = process.env[name];
      if (!value) throw new Error(`${name} is required`);
      return value;
    }

    function positiveInt(value, fallback) {
      const parsed = Number.parseInt(value ?? '', 10);
      return Number.isFinite(parsed) && parsed > 0 ? parsed : fallback;
    }

    function labelValue(value) {
      return value
        .toLowerCase()
        .replace(/[^a-z0-9_.-]+/g, '-')
        .replace(/^[^a-z0-9]+/, '')
        .replace(/[^a-z0-9]+$/, '')
        .slice(0, 63);
    }

    function log(message, data = {}) {
      console.log(JSON.stringify({ level: 'info', message, ...data }));
    }
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: labels-tracking-poll-scheduler
  namespace: skirmshop
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: labels-tracking-poll-scheduler
        spec:
          restartPolicy: Never
          enableServiceLinks: false
          nodeSelector: { role: edge, kubernetes.io/arch: amd64 }
          tolerations:
            - { key: role, operator: Equal, value: edge, effect: NoSchedule }
          containers:
            - name: tracking-poll-scheduler
              image: harbor.e-dani.com/homelab/skirmshop-labels-saga-launcher@sha256:d6acce89a1712cd4349de7b270d6b13c12d0be45921ab27e3b65d2bc9d5c2853
              command: ["node", "/app/scripts/poll-tracking-scheduler.mjs"]
              env:
                - { name: PG_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres-shared-rw.databases.svc.cluster.local:5432/labels" }
                - { name: SYNAPSE_API_URL, value: "http://labels-synapse-api.skirmshop.svc.cluster.local:8080" }
                - { name: POLL_TRACKING_WORKFLOW_NAMESPACE, value: "skirmshop" }
                - { name: POLL_TRACKING_WORKFLOW_NAME, value: "poll-tracking" }
                - { name: POLL_TRACKING_WORKFLOW_VERSION, value: "1.2.0" }
                - { name: POLL_TRACKING_BATCH_SIZE, value: "100" }
                - { name: REQUEST_TIMEOUT_MS, value: "15000" }
              envFrom: [{ secretRef: { name: labels-secrets } }]
              volumeMounts:
                - { name: scheduler-script, mountPath: /app/scripts, readOnly: true }
              resources:
                requests: { cpu: 20m, memory: 64Mi }
                limits: { memory: 256Mi }
          volumes:
            - name: scheduler-script
              configMap:
                name: labels-tracking-poll-scheduler
