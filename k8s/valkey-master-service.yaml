# =============================================================================
# Valkey master-tracking Service — stable standalone master endpoint.
# =============================================================================
# Synapse alpha1 (Neuroglia/StackExchange.Redis) does NOT work in Sentinel-
# discovery mode (it assumes a standalone Redis; pointing it at a sentinel
# endpoint left it persisting nothing + SIGSEGV). So instead of asking the
# client to do Sentinel, we expose a stable endpoint that ALWAYS points at the
# current Valkey master, and Synapse connects to it as a plain standalone Redis
# (labels-valkey-master:6379). Valkey+Sentinel still does the actual failover;
# this just keeps the Service Endpoints pointing at whoever is master.
#
# A small labeler polls each valkey pod's role (`valkey-cli role`) and stamps
# `valkey-role=master|replica` on the pod; the Service selects valkey-role=master.
# On failover, the labeler re-stamps and the Service follows (~poll interval).
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: valkey-master-labeler
  namespace: skirmshop
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: valkey-master-labeler
  namespace: skirmshop
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: valkey-master-labeler
  namespace: skirmshop
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: valkey-master-labeler
subjects:
  - kind: ServiceAccount
    name: valkey-master-labeler
    namespace: skirmshop
---
apiVersion: v1
kind: Service
metadata:
  name: labels-valkey-master
  namespace: skirmshop
  labels:
    app: labels-valkey-master
spec:
  # Selects ONLY the pod currently labelled master → stable standalone endpoint.
  selector:
    app: labels-valkey
    valkey-role: master
  ports:
    - { name: valkey, port: 6379, targetPort: 6379 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: labels-valkey-master-labeler
  namespace: skirmshop
  labels:
    app: labels-valkey-master-labeler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: labels-valkey-master-labeler
  template:
    metadata:
      labels:
        app: labels-valkey-master-labeler
    spec:
      serviceAccountName: valkey-master-labeler
      enableServiceLinks: false
      nodeSelector: { workload: core }
      containers:
        - name: labeler
          image: alpine/k8s:1.32.5
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -u
              PODS="labels-valkey-0 labels-valkey-1 labels-valkey-2"
              echo "valkey-master-labeler started"
              while true; do
                for p in $PODS; do
                  role=$(kubectl -n skirmshop exec "$p" -c valkey -- valkey-cli -p 6379 role 2>/dev/null | head -1)
                  case "$role" in
                    master) kubectl -n skirmshop label pod "$p" valkey-role=master --overwrite >/dev/null 2>&1 ;;
                    slave)  kubectl -n skirmshop label pod "$p" valkey-role=replica --overwrite >/dev/null 2>&1 ;;
                    *) : ;;  # unreachable/unknown → leave label as-is (avoid flapping)
                  esac
                done
                sleep 5
              done
          resources:
            requests: { cpu: 20m, memory: 48Mi }
            limits: { memory: 128Mi }
