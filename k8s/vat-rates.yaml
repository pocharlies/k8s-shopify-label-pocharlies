# IVA aplicable al envío en checkout, indexado por código de país ISO 3166-1.
# Skirmshop es vendedor B2C español acogido al régimen OSS: cobramos IVA del
# país de destino al cliente final EU. Para destinos extra-EU el tipo es 0
# (DDU: el cliente paga aduana y VAT local al recibir el paquete).
#
# Fuente: tipos vigentes 2026-05 (https://taxation-customs.ec.europa.eu).
# Refrescado semanalmente por el CronJob labels-vat-sync, que reemplaza este
# fichero leyendo Shopify Admin REST /countries.json (los Markets del shop
# son la única fuente que mantiene el merchant).
#
# Para destinos no listados se aplica `default_country_rate` (= ES 21 %).
# Canarias / Ceuta / Melilla NO llevan IVA peninsular sino IGIC/IPSI: hoy se
# trata como ES 21 % (over-charge) hasta que añadamos lógica por province_code.
apiVersion: v1
kind: ConfigMap
metadata:
  name: labels-vat-rates
  namespace: skirmshop
  annotations:
    skirmshop.labels/synced-at: "2026-05-29T00:00:00Z"
    skirmshop.labels/source: seed (taxation-customs.ec.europa.eu 2026-05)
data:
