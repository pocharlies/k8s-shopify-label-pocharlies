# Per-destination VAT (IVA) rate applied to checkout shipping prices.
#
# This manifest creates the ConfigMap SHELL only — the `data` field is
# populated at runtime by the labels-vat-sync CronJob (Sundays 03:00 UTC)
# which reads Shopify Admin REST /countries.json (the same numbers the
# merchant edits in Markets). The Argo Application
# (apps/shopify-label.yaml in k8s-gitops-pocharlies) declares
# ignoreDifferences on /data so an Argo apply does NOT roll back a fresh
# pull — but Apply still re-pushes any data we put here, so we leave it
# empty on purpose.
#
# Bootstrap window: on a brand-new cluster, the ConfigMap has no data
# until the first CronJob run (or a manual trigger). During that window
# shopify-app's loadVatRates falls back to FALLBACK_VAT_RATES (ES 21 %
# only, default_country_rate 21 %) so peninsular customers see correct
# prices; other destinations under-charge by ~2 % until the sync lands.
# Trigger a manual run with:
#   kubectl create job -n skirmshop --from=cronjob/labels-vat-sync \
#     vat-sync-bootstrap-$(date +%s)
apiVersion: v1
kind: ConfigMap
metadata:
  name: labels-vat-rates
  namespace: skirmshop
  annotations:
    skirmshop.labels/source: "(populated at runtime by labels-vat-sync)"
