apiVersion: v1
kind: ServiceAccount
metadata:
  name: labels-synapse-operator
  namespace: skirmshop
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: labels-synapse-operator
  namespace: skirmshop
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: labels-synapse-operator
  namespace: skirmshop
subjects:
  - kind: ServiceAccount
    name: labels-synapse-operator
    namespace: skirmshop
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: labels-synapse-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: labels-shopify-fulfillment-service
  namespace: skirmshop
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: labels-shopify-fulfillment-service } }
  template:
    metadata: { labels: { app: labels-shopify-fulfillment-service } }
    spec:
      enableServiceLinks: false
      nodeSelector: { role: edge, kubernetes.io/arch: amd64 }
      tolerations:
        - { key: role, operator: Equal, value: edge, effect: NoSchedule }
      containers:
        - name: shopify-fulfillment-service
          image: harbor.e-dani.com/homelab/skirmshop-labels-shopify-fulfillment-service:20260522-synapse
          ports: [{ name: http, containerPort: 3000 }]
          env:
            - { name: PORT, value: "3000" }
            - { name: SHOPIFY_SHOP_DOMAIN, value: "ymimst-yh.myshopify.com" }
            - { name: PG_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres-shared-rw.databases.svc.cluster.local:5432/labels" }
          envFrom: [{ secretRef: { name: labels-secrets } }]
          resources:
            requests: { cpu: 30m, memory: 64Mi }
            limits: { memory: 256Mi }
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata: { name: labels-shopify-fulfillment-service, namespace: skirmshop }
spec:
  selector: { app: labels-shopify-fulfillment-service }
  ports: [{ name: http, port: 3005, targetPort: 3000 }]
---
