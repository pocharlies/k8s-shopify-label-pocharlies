apiVersion: batch/v1
kind: Job
metadata:
  name: labels-synapse-workflow-registrar-v129
  namespace: skirmshop
spec:
  backoffLimit: 2
  template:
    metadata: { labels: { app: labels-synapse-workflow-registrar } }
    spec:
      restartPolicy: Never
      enableServiceLinks: false
      nodeSelector: { role: edge, kubernetes.io/arch: amd64 }
      tolerations:
        - { key: role, operator: Equal, value: edge, effect: NoSchedule }
      containers:
        - name: synapse-workflow-registrar
          image: harbor.e-dani.com/homelab/skirmshop-labels-synapse-workflow-registrar:20260522-synapse
          env:
            - { name: SYNAPSE_API_URL, value: "http://labels-synapse-api.skirmshop.svc.cluster.local:8080" }
            - { name: WORKFLOWS_DIR, value: "/workflows" }
            - { name: WORKFLOW_FILES, value: "generate-shipment-label.yaml,handle-tracking-event.yaml,process-return.yaml,poll-tracking.yaml" }
          envFrom: [{ secretRef: { name: labels-secrets } }]
          volumeMounts:
            - { name: workflows, mountPath: /workflows, readOnly: true }
          resources:
            requests: { cpu: 20m, memory: 64Mi }
            limits: { memory: 256Mi }
      volumes:
        - name: workflows
          configMap: { name: labels-synapse-workflows }
