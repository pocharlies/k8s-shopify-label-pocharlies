apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: labels-telegram-bot
  namespace: skirmshop
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vault-backend, kind: ClusterSecretStore }
  target:
    name: labels-telegram-bot
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        bot_token: "{{ .synapse_bot_token }}"
  data:
    - secretKey: synapse_bot_token
      remoteRef:
        key: observability/prod/telegram
        property: synapse_bot_token
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: labels-notification-dispatcher
  namespace: skirmshop
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: labels-notification-dispatcher } }
  template:
    metadata: { labels: { app: labels-notification-dispatcher } }
    spec:
      enableServiceLinks: false
      nodeSelector: { role: edge, kubernetes.io/arch: amd64 }
      tolerations:
        - { key: role, operator: Equal, value: edge, effect: NoSchedule }
      containers:
        - name: notification-dispatcher
          image: harbor.e-dani.com/homelab/skirmshop-labels-notification-dispatcher@sha256:be2c90854ea6f389cbdec5eafde6240d6ba09619cd9874074bf822977e0c1760
          ports: [{ name: http, containerPort: 3000 }]
          env:
            - { name: PORT, value: "3000" }
            - { name: SHOPIFY_SHOP_DOMAIN, value: "ymimst-yh.myshopify.com" }
            - { name: PG_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres-shared-rw.databases.svc.cluster.local:5432/labels" }
            - { name: NOTIFICATIONS_ENABLED, value: "false" }
            - { name: EMAIL_ENABLED, value: "false" }
            - { name: WHATSAPP_ENABLED, value: "false" }
            - { name: TELEGRAM_ENABLED, value: "false" }
            - { name: LABEL_STORAGE_URL, value: "http://labels-label-storage.skirmshop.svc.cluster.local:3007" }
            - { name: SHOPIFY_ADMIN_STORE, value: "skirmshop-spain" }
            - { name: OPS_TELEGRAM_ENABLED, value: "true" }
            - { name: OPS_TELEGRAM_CHAT_ID, value: "-1003984393379" }
            - { name: OPS_TELEGRAM_LABELS_THREAD_ID, value: "6921" }
            - name: OPS_TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef: { name: labels-telegram-bot, key: bot_token }
          envFrom: [{ secretRef: { name: labels-secrets } }]
          resources:
            requests: { cpu: 20m, memory: 64Mi }
            limits: { memory: 256Mi }
          readinessProbe:
            httpGet: { path: /ready, port: 3000 }
            initialDelaySeconds: 10
---
